<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bem-vindo - NIT / OAB-CE</title>
  <link rel="icon" type="image/png" href="/assets/imgs/img3.png" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            "nit-blue": "#1b365d",
            "nit-blue-dark": "#142846",
          },
          fontFamily: { sans: ["Inter", "sans-serif"] },
          backgroundImage: {
            "footer-gradient": "linear-gradient(90deg, #981924 0%, #362942 50%, #1b365d 100%)",
          },
        },
      },
    };
  </script>
</head>
<body class="min-h-screen bg-gray-50 flex flex-col font-sans">

  <header class="bg-nit-blue text-white px-6 py-3 flex items-center justify-between shadow-md">
    <img src="/assets/imgs/Logo3.1.png" alt="NIT OAB/CE" class="h-10 object-contain" />

    <div class="flex items-center gap-3">
      <div class="relative">
        <button
          id="profile-trigger"
          type="button"
          class="flex items-center gap-3 rounded-xl px-3 py-2 transition hover:bg-white/10"
          aria-expanded="false"
          aria-controls="profile-menu"
        >
          <div class="flex h-11 w-11 items-center justify-center rounded-full border border-white/15 bg-white/10 shadow-inner">
            <i class="fas fa-user text-base text-white"></i>
          </div>
          <div class="hidden text-right sm:block">
            <p id="header-name" class="text-sm font-medium leading-tight"></p>
            <p id="header-profile" class="text-xs leading-tight text-white/60"></p>
          </div>
          <i class="fas fa-chevron-down text-xs text-white/70"></i>
        </button>

        <div
          id="profile-menu"
          class="absolute right-0 top-[calc(100%+0.75rem)] hidden min-w-[240px] overflow-hidden rounded-2xl border border-slate-200 bg-white text-left shadow-xl"
        >
          <div class="border-b border-slate-100 px-4 py-3">
            <p id="menu-name" class="text-sm font-semibold text-slate-900"></p>
            <p id="menu-profile" class="text-xs text-slate-500"></p>
          </div>

          <a
            id="menu-admin-link"
            href="/admin-solicitacoes.html"
            class="hidden items-center gap-3 px-4 py-3 text-sm font-medium text-slate-700 transition hover:bg-slate-50 hover:text-nit-blue"
          >
            <i class="fas fa-user-shield w-4 text-center text-nit-blue"></i>
            <span>Painel administrativo</span>
          </a>

          <button
            id="btn-logout"
            type="button"
            class="flex w-full items-center gap-3 px-4 py-3 text-left text-sm font-medium text-rose-600 transition hover:bg-rose-50"
          >
            <i class="fas fa-sign-out-alt w-4 text-center"></i>
            <span>Sair</span>
          </button>
        </div>
      </div>
    </div>
  </header>

  <main class="flex-1 flex items-center justify-center p-6">
    <div class="w-full max-w-md rounded-2xl border border-gray-100 bg-white p-10 text-center shadow-sm">
      <div class="mx-auto mb-6 flex h-20 w-20 items-center justify-center rounded-full bg-nit-blue/5">
        <img src="/assets/imgs/img3.png" alt="NIT" class="h-12 w-12 object-contain" />
      </div>
      <h1 class="mb-1 text-2xl font-semibold text-gray-800">Bem-vindo(a),</h1>
      <p id="welcome-name" class="mb-4 text-2xl font-semibold text-nit-blue"></p>
      <p class="text-sm leading-relaxed text-gray-500">
        Voce esta acessando o <strong class="text-gray-700">NIT</strong> -
        Nucleo de Inovacao Tecnologica da OAB/CE.<br /><br />
        As funcionalidades do sistema estarao disponiveis em breve.
      </p>
    </div>
  </main>

  <div class="h-1.5 bg-footer-gradient"></div>

  <script>
    (function () {
      const raw = localStorage.getItem('nit_user');
      if (!raw) { window.location.href = '/login.html'; return; }

      const user = JSON.parse(raw);
      const nome = user.nome || 'Usuario';
      const perfil = user.oab ? 'Advogado(a)' : 'Colaborador(a)';

      const profileTrigger = document.getElementById('profile-trigger');
      const profileMenu = document.getElementById('profile-menu');
      const menuAdminLink = document.getElementById('menu-admin-link');

      document.getElementById('welcome-name').textContent = nome;
      document.getElementById('header-name').textContent = nome;
      document.getElementById('header-profile').textContent = perfil;
      document.getElementById('menu-name').textContent = nome;
      document.getElementById('menu-profile').textContent = perfil;

      if (user.adm && menuAdminLink) {
        menuAdminLink.classList.remove('hidden');
        menuAdminLink.classList.add('flex');
      }

      function closeMenu() {
        profileMenu.classList.add('hidden');
        profileTrigger.setAttribute('aria-expanded', 'false');
      }

      function openMenu() {
        profileMenu.classList.remove('hidden');
        profileTrigger.setAttribute('aria-expanded', 'true');
      }

      profileTrigger.addEventListener('click', () => {
        const isOpen = !profileMenu.classList.contains('hidden');
        if (isOpen) closeMenu();
        else openMenu();
      });

      document.addEventListener('click', (event) => {
        if (!profileMenu.contains(event.target) && !profileTrigger.contains(event.target)) {
          closeMenu();
        }
      });

      document.addEventListener('keydown', (event) => {
        if (event.key === 'Escape') closeMenu();
      });

      document.getElementById('btn-logout').addEventListener('click', () => {
        localStorage.removeItem('nit_user');
        window.location.href = '/login.html';
      });
    })();
  </script>
</body>
</html>
