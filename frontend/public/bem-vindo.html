<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bem-vindo - NIT / OAB-CE</title>
  <link rel="icon" type="image/png" href="/assets/imgs/img3.png" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            "nit-blue": "#1b365d",
            "nit-blue-dark": "#142846",
          },
          fontFamily: { sans: ["Inter", "sans-serif"] },
          backgroundImage: {
            "footer-gradient": "linear-gradient(90deg, #981924 0%, #362942 50%, #1b365d 100%)",
          },
        },
      },
    };
  </script>
</head>
<body class="min-h-screen bg-gray-50 flex flex-col font-sans">

  <!-- Header -->
  <header class="bg-nit-blue text-white px-6 py-3 flex items-center justify-between shadow-md">
    <img src="/assets/imgs/Logo3.1.png" alt="NIT OAB/CE" class="h-10 object-contain" />
    <div class="flex items-center gap-4">
      <div class="w-11 h-11 rounded-full bg-white/10 border border-white/15 flex items-center justify-center shadow-inner">
        <i class="fas fa-user text-base text-white"></i>
      </div>
      <div class="text-right hidden sm:block">
        <p id="header-name" class="text-sm font-medium leading-tight"></p>
        <p id="header-profile" class="text-xs text-white/50 leading-tight"></p>
      </div>
      <button id="btn-logout"
        class="flex items-center gap-2 text-sm bg-white/10 hover:bg-white/20 px-3 py-1.5 rounded-lg transition">
        <i class="fas fa-sign-out-alt"></i>
        <span class="hidden sm:inline">Sair</span>
      </button>
    </div>
  </header>

  <!-- Main -->
  <main class="flex-1 flex items-center justify-center p-6">
    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-10 max-w-md w-full text-center">
      <div class="w-20 h-20 bg-nit-blue/5 rounded-full flex items-center justify-center mx-auto mb-6">
        <img src="/assets/imgs/img3.png" alt="NIT" class="w-12 h-12 object-contain" />
      </div>
      <h1 class="text-2xl font-semibold text-gray-800 mb-1">Bem-vindo(a),</h1>
      <p id="welcome-name" class="text-2xl font-semibold text-nit-blue mb-4"></p>
      <p class="text-sm text-gray-500 leading-relaxed">
        Você está acessando o <strong class="text-gray-700">NIT</strong> —
        Núcleo de Inovação Tecnológica da OAB/CE.<br /><br />
        As funcionalidades do sistema estarão disponíveis em breve.
      </p>
    </div>
  </main>

  <!-- Footer gradient bar -->
  <div class="h-1.5 bg-footer-gradient"></div>

  <script>
    (function () {
      const raw = localStorage.getItem('nit_user');
      if (!raw) { window.location.href = '/login.html'; return; }

      const user = JSON.parse(raw);
      if (user.adm) { window.location.href = '/admin-solicitacoes.html'; return; }

      const nome = user.nome || 'Usuário';
      document.getElementById('welcome-name').textContent = nome;
      document.getElementById('header-name').textContent = nome;
      document.getElementById('header-profile').textContent = user.oab ? 'Advogado(a)' : 'Colaborador(a)';

      document.getElementById('btn-logout').addEventListener('click', () => {
        localStorage.removeItem('nit_user');
        window.location.href = '/login.html';
      });
    })();
  </script>
</body>
</html>
